LIBRERÍAS EXTERNAS

<style>

/* =========================
ESTILOS GENERALES
========================= */

body{
    margin:0;
    font-family: 'Patrick Hand', cursive;
    background:#1e2a38;
    color:white;
    overflow:hidden;
}

h1{
    text-align:center;
    margin:10px;
}

/* =========================
CONTENEDOR PRINCIPAL
========================= */

#gameContainer{
    width:100vw;
    height:100vh;
    position:relative;
    overflow:hidden;
}

/* =========================
MAPA GLOBAL
========================= */

#worldMap{
    width:100%;
    height:100%;
    background:url('fondo.jpg') center/contain no-repeat;
    position:absolute;
}

/* =========================
REGIONES CLICKABLES
========================= */

.region{
    position:absolute;
    border:2px dashed rgba(255,255,255,0.2);
    cursor:pointer;
    transition:0.3s;
}

.region:hover{
    background:rgba(255,255,255,0.1);
}

/* =========================
REGION VIEW
========================= */

#regionView{
    position:absolute;
    inset:0;
    background:#000;
    display:none;
    overflow:hidden;
}

#regionImage{
    width:100%;
    height:auto;
    display:block;
}

/* =========================
MARCADORES
========================= */

.marker{
    position:absolute;
    width:24px;
    height:24px;
    background:gold;
    border-radius:50%;
    cursor:pointer;
    transform:translate(-50%, -50%);
    animation:bounce 1.2s infinite;
}

@keyframes bounce{
    0%,100%{transform:translate(-50%,-50%) translateY(0);}
    50%{transform:translate(-50%,-50%) translateY(-8px);}
}

/* =========================
MODAL PERGAMINO
========================= */

#modal{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    width:300px;
    background:#f5e6c8;
    color:#3b2f1b;
    padding:20px;
    border-radius:10px;
    display:none;
    box-shadow:0 10px 30px rgba(0,0,0,0.5);
}

#modal img{
    width:100%;
    border-radius:8px;
}

button{
    margin-top:10px;
    padding:8px 12px;
    border:none;
    background:#8b5a2b;
    color:white;
    border-radius:6px;
    cursor:pointer;
}

/* =========================
PANEL LATERAL
========================= */

#sidePanel{
    position:absolute;
    right:0;
    top:0;
    width:220px;
    height:100%;
    background:rgba(0,0,0,0.6);
    padding:10px;
    overflow:auto;
}

/* =========================
BOTON VOLVER
========================= */

#backBtn{
    position:absolute;
    top:10px;
    left:10px;
    z-index:10;
}

</style>
</head>

/* =====================================================
ABRIR REGION
===================================================== */

let panzoomInstance;

function openRegion(id){

    const region = regionsData[id];
    if(!region) return;

    document.getElementById("worldMap").style.display="none";
    document.getElementById("regionView").style.display="block";

    const img = document.getElementById("regionImage");
    img.src = region.image;

    const markersContainer = document.getElementById("markersContainer");
    markersContainer.innerHTML="";

    region.items.forEach(item=>{
        createMarker(item);
    });

    // Panzoom
    const elem = document.getElementById("panzoomContainer");

    if(panzoomInstance) panzoomInstance.destroy();

    panzoomInstance = Panzoom(elem,{
        maxScale:4,
        contain:"outside"
    });

    elem.addEventListener('wheel', panzoomInstance.zoomWithWheel);

}

/* =====================================================
CERRAR REGION
===================================================== */

function closeRegion(){
    document.getElementById("worldMap").style.display="block";
    document.getElementById("regionView").style.display="none";
}

/* =====================================================
CREAR MARCADOR
===================================================== */

function createMarker(item){

    const marker = document.createElement("div");
    marker.className="marker";

    marker.style.left = item.x + "%";
    marker.style.top = item.y + "%";

    marker.onclick = ()=> openItem(item);

    document.getElementById("markersContainer").appendChild(marker);
}

/* =====================================================
ABRIR ITEM
===================================================== */

function openItem(item){

    document.getElementById("modal").style.display="block";

    document.getElementById("modalTitle").innerText = item.name;
    document.getElementById("modalDesc").innerText = item.description;
    document.getElementById("modalImg").src = item.imageUrl;

    document.getElementById("modalLink").onclick = ()=>{
        window.open(item.link,"_blank");
    }

    // puntuación
    if(!gameState.discovered.has(item.id)){
        gameState.discovered.add(item.id);
        addScore(10);

        // misión
        if(item.type === gameState.mission.targetType){
            gameState.mission.progress++;
            checkMission();
        }
    }
}

/* =====================================================
MODAL
===================================================== */

function closeModal(){
    document.getElementById("modal").style.display="none";
}

/* =====================================================
PUNTUACIÓN
===================================================== */

function addScore(points){
    gameState.score += points;
    document.getElementById("score").innerText = gameState.score;
}

/* =====================================================
MISIÓN
===================================================== */

function checkMission(){

    if(gameState.mission.progress >= gameState.mission.goal){
        alert("🎉 ¡Misión completada!");
        gameState.mission.progress = 0;
    }

    updateMissionUI();
}
